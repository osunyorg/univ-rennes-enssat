<div class="additionnal-footer">
  <div class="container">
    <div class="logos">
      <img src="/assets/images/logos/cti.svg" alt="CTI - Commission des titres d'ingénieur">
      <img src="/assets/images/logos/cg.svg" alt="CG - Conférence des Grandes Écoles">
      <img src="/assets/images/logos/eurace.jpg" alt="EURACE - Conférence des Directeurs des Écoles Françaises d'Ingénieurs">
      <img src="/assets/images/logos/cdefi.svg" alt="CDEFI - Conférence des Directeurs des Écoles Françaises d'Ingénieurs">
    </div>
    <div class="links">
      {{ $networks_menu := partial "GetMenu" "extranets-menu" }}
      {{ if $networks_menu }}
        {{ partial "commons/menu.html" (dict
            "kind" "extranets-menu"
            "level" 1
            "context" .
            "class" "networks-menu"
          )}}
      {{ end }}
      {{ partial "commons/menu/i18n.html" (dict
        "kind" "additionnal-footer"
        "context" .
      ) }}
    </div>
  </div>
</div>
