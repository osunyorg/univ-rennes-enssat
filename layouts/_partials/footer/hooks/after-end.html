<div class="additionnal-footer">

    <div class="certifications">
      <img src="/assets/images/logos/cti.svg" alt="CTI - Commission des titres d'ingénieur">
    </div>
    <div class="links">
      {{ $networks_menu := partial "GetMenu" "extranets-menu" }}
      {{ if $networks_menu }}
        {{ partial "commons/menu.html" (dict
            "kind" "networks-menu"

          )}}

      {{ partial "commons/menu/i18n.html" (dict

        "context" .
      ) }}
    </div>
  </div>
</div>
